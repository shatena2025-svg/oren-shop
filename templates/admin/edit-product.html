{% extends 'base.html' %}

{% block header %}
<title>edit product</title>
{% endblock %}

{% block body %}
<img style="width: 200px;" src="/static/cover/{{ product.id }}.jpg">
<form action="#" method="post" enctype="multipart/form-data">
   <input type="hidden" name="csrf_token" value="{{ csrf_token() }}" />
   <label>cover</label><input type="file" name="cover"><br>
   <input type="text" value="{{ product.name }}" name="name" placeholder="نام محصول"><br>
   <textarea name="description" placeholder="توضیحات">{{ product.description }}</textarea><br>
   <input type="number" value="{{ product.price }}" name="price" placeholder="قیمت محصول"><br>
   <label>فعال:</label><input value="1" type="checkbox" name="active" {{ "checked" if product.active == 1 }} ><br>
   <input type="submit" value="ثبت تغییرات">
</form>

{% endblock %}
