{% extends 'base.html' %}

{% block header %}
<title>admin product</title>
{% endblock %}

{% block body %}

<table>
   <tr>
      <th>تصویر</th>
      <th>اسم</th>
      <th>توضیحات</th>
      <th>قیمت</th>
      <th>فعال</th>
      <th>ویرایش</th>
   </tr>

   {% for p in product %}
   <tr>
      <td><img style="width: 30px;" src="/static/cover/{{ p.id }}.jpg"></td>
      <td>{{p.name}}</td>
      <td>{{p.description}}</td>
      <td>{{p.price}}</td>
      <td>{{p.active}}</td>
      <td><a href="/admin/dashboard/edit-product/{{ p.id }}">ویرایش</a></td>
   </tr>
   {% endfor %}
</table>
<form action="/admin/dashboard/products" method="post" enctype="multipart/form-data"> 
   <input type="hidden" name="csrf_token" value="{{ csrf_token() }}" />
   <label>cover</label><input type="file" name="cover"></input><br>
   <input type="text" name="name" placeholder="نام محصول"><br>
   <textarea name="description" placeholder="توضیحات"></textarea><br>
   <input type="number" name="price" placeholder="قیمت محصول"><br>
   <label>فعال:</label><input value="1" type="checkbox" name="active">
   <input type="submit">
</form>

{% endblock %}
